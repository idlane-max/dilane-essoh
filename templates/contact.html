<div class="contact-container">
    <div class="portfolio-header">
        <h1 class="section-title"><span class="accent">Me</span> Contacter</h1>
        <p class="section-subtitle">Une question, une opportunité de stage ou un projet ? N'hésitez pas à me contacter directement.</p>
    </div>

    <div class="contact-grid">
        <div class="contact-info-col">
            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-text">
                    <h3>Email</h3>
                    <a href="mailto:akpasamessoh@gmail.com">akpasamessoh@gmail.com</a>
                </div>
            </div>

            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <div class="contact-text">
                    <h3>Téléphone</h3>
                    <a href="tel:+33760360779">+33 7 60 36 07 79</a>
                </div>
            </div>

            <div class="contact-card">
                <div class="contact-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="contact-text">
                    <h3>Localisation</h3>
                    <p>Paris, France</p>
                </div>
            </div>
        </div>

        <div class="contact-form-col">
            <div class="form-wrapper">
                <h2 class="form-title">Envoyer un message</h2>
                <form id="cyber-contact-form" method="POST" action="https://formspree.io/f/xojkbvke">
                    <input type="hidden" name="_subject" value="Nouveau message depuis le portfolio">
                    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;opacity:0;">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Adresse Email</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Bonjour, je vous contacte pour..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">
                        <i class="fas fa-paper-plane"></i> Envoyer
                    </button>
                    <p id="contact-status" class="contact-status" aria-live="polite"></p>
                </form>
            </div>
        </div>
    </div>
</div>
